<!doctype html>
<html lang="ko">
  <head>
    <title>FFT Pattern Emulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@2.2.3/dist/chartjs-plugin-dragdata.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background-color: #f8fafc;
      }
      .container {
        max-width: 1200px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        justify-content: center;
      }
      button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        color: white;
      }
      .btn-normal {
        background: #3b82f6;
      }
      .btn-leak {
        background: #ef4444;
      }
      .btn-send {
        background: #10b981;
        font-size: 1.1em;
      }
      .btn-stop {
        background: #64748b;
      }
      select {
        padding: 10px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 style="text-align: center; color: #1e293b">
        🎛️ Interactive FFT Pattern Editor (Drag Points!)
      </h2>

      <div style="text-align: center; margin-bottom: 20px">
        <label><b>상태 라벨: </b></label>
        <select id="fft_label">
          <option value="normal">Normal (정상)</option>
          <option value="leak">Leak (누출)</option>
        </select>

        <button
          class="btn-normal"
          onclick="loadPreset('normal')"
          style="margin-left: 20px"
        >
          🌊 정상 패턴 불러오기
        </button>
        <button class="btn-leak" onclick="loadPreset('leak')">
          💥 누출(Peak) 패턴 불러오기
        </button>
      </div>

      <div style="height: 500px">
        <canvas id="fftChart"></canvas>
      </div>

      <div class="controls">
        <button id="btn-start" class="btn-send" onclick="startEmulator()">
          ▶️ 데이터 전송 시작 (1초 주기)
        </button>
        <button class="btn-stop" onclick="stopEmulator()">⏹️ 전송 중지</button>
      </div>
    </div>

      const BASE_DATA = BASE_RAW_STRING.split("|").map(Number);
      const DIMENSION = BASE_DATA.length; // 128개로 자동 세팅

      const ctx = document.getElementById("fftChart").getContext("2d");
      let emulatorInterval = null;

      // X축 라벨 생성 (25kHz ~ 88kHz 대역을 128개 구간으로 쪼갬)
      const labels = Array.from(
        { length: DIMENSION },
        (_, i) => (25 + (i / (DIMENSION - 1)) * (88 - 25)).toFixed(1) + "k",
      );

      // 현재 데이터 상태 (초기엔 BASE_DATA 복사)
      let currentData = [...BASE_DATA];

      const fftChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [
            {
              label: "FFT Magnitude",
              data: currentData,
              borderColor: "#ef4444",
              backgroundColor: "rgba(239, 68, 68, 0.2)",
              borderWidth: 2,
              pointRadius: 4, // 점 크기를 살짝 줄임 (128개라 너무 크면 뭉침)
              pointHoverRadius: 8,
              fill: true,
              tension: 0.2,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            // 🌟 2. 최대값이 0.013 부근이므로, 마우스 드래그를 위해 Y축을 0.03으로 넉넉하게 세팅
            y: { min: 0, max: 0.03 },
          },
          plugins: {
            dragData: {
              // 🌟 3. 작은 소수점 단위 조작을 위해 스냅(round)을 5자리로 정밀하게 변경
              round: 5,
              showTooltip: true,
            },
          },
        },
      });

      function loadPreset(type) {
        // 베이스 데이터 복사
        const newData = [...BASE_DATA];

        // 누출(Leak) 상태일 때만 특정 대역에 피크(Peak)를 솟구치게 함
        if (type === "leak") {
          // 예시 1: 30kHz 부근 (인덱스 15 전후)
          for (let i = 13; i <= 17; i++) {
            if (i === 15) newData[i] += 0.015;
            else newData[i] += 0.005;
          }
          // 예시 2: 70kHz 부근 (인덱스 90 전후)
          for (let i = 88; i <= 92; i++) {
            if (i === 90) newData[i] += 0.012;
            else newData[i] += 0.003;
          }
        }

        fftChart.data.datasets[0].data = newData;
        fftChart.update();
        document.getElementById("fft_label").value = type;
      }

      // 처음 켤 때 정상 프리셋(원본 데이터) 로드
      loadPreset("normal");

      async function sendData() {
        const rawArray = fftChart.data.datasets[0].data;
        // 🌟 AI 모델이 기대하는 8자리 소수점 통문자열 포맷으로 변환
        const fftString = rawArray.map((v) => Number(v).toFixed(8)).join("|");
        const label = document.getElementById("fft_label").value;

        try {
          await fetch("/api/start_fft_custom", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              label: label,
              fft_data: fftString,
            }),
          });
        } catch (e) {
          console.error("FFT 전송 실패:", e);
        }
      }

      function startEmulator() {
        if (emulatorInterval) return;
        document.getElementById("btn-start").innerText =
          "⏳ Sending Data... (Running)";
        document.getElementById("btn-start").style.background = "#f59e0b";

        sendData();
        emulatorInterval = setInterval(() => {
          const current = fftChart.data.datasets[0].data;
          // 🌟 데이터가 아주 작으므로, 미세한 노이즈(0.0005 이하)만 줘서 춤추게 만듦
          const jittered = current.map((v) =>
            Math.max(0, v + (Math.random() - 0.5) * 0.0005),
          );
          fftChart.data.datasets[0].data = jittered;
          fftChart.update("none");

          sendData();
        }, 1000);
      }

      function stopEmulator() {
        if (emulatorInterval) {
          clearInterval(emulatorInterval);
          emulatorInterval = null;
          document.getElementById("btn-start").innerText =
            "▶️ 데이터 전송 시작 (1초 주기)";
          document.getElementById("btn-start").style.background = "#10b981";
        }
      }
    </script>
  </body>
</html>
