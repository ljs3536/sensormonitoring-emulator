<html>
  <head>
    <title>Sensor Emulator Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@2.2.3/dist/chartjs-plugin-dragdata.min.js"></script>
  </head>
  <body
    style="font-family: sans-serif; padding: 20px; background-color: #f8fafc"
  >
    <div
      style="
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      "
    >
      <h2 style="text-align: center; color: #1e293b">
        📊 Precision Pattern Editor (32-Point)
      </h2>

      <div style="display: flex; gap: 20px; margin-top: 20px">
        <div
          style="
            flex: 1;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
          "
        >
          <h4 style="margin-top: 0">1. Sensor Type</h4>
          <button
            onclick="changeSensor('piezo')"
            id="btn-piezo"
            style="
              width: 100%;
              padding: 10px;
              margin-bottom: 8px;
              background: #3b82f6;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-weight: bold;
            "
          >
            Piezo
          </button>
          <button
            onclick="changeSensor('adxl')"
            id="btn-adxl"
            style="
              width: 100%;
              padding: 10px;
              background: #94a3b8;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-weight: bold;
            "
          >
            ADXL
          </button>

          <h4 style="margin-top: 20px">2. Target Sensor (DB)</h4>
          <select
            id="sensor_id_select"
            onchange="updateTargetSensor()"
            style="
              width: 100%;
              padding: 10px;
              border-radius: 8px;
              border: 1px solid #ccc;
              margin-bottom: 8px;
              background: white;
            "
          >
            <option value="">Loading...</option>
          </select>

          <h4 style="margin-top: 20px">3. Action</h4>
          <button
            onclick="fetch('/api/start_basic', { method: 'POST' })"
            style="
              width: 100%;
              padding: 10px;
              background: #10b981;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              margin-bottom: 8px;
            "
          >
            Auto Start
          </button>
          <button
            id="btn-start"
            onclick="startCustomLoop()"
            style="
              width: 100%;
              padding: 10px;
              background: #6366f1;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              margin-bottom: 8px;
              font-weight: bold;
              transition: 0.2s;
            "
          >
            ▶ Start Emulation
          </button>
          <button
            onclick="stopEmulator()"
            style="
              width: 100%;
              padding: 10px;
              background: #ef4444;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-weight: bold;
            "
          >
            ⏹ Stop
          </button>
        </div>

        <div style="flex: 3">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 10px;
            "
          >
            <h4 id="chart-title" style="margin: 0; color: #475569">
              Piezo 패턴 (32 제어점)
            </h4>
            <select
              id="custom_label"
              onchange="setPresetData()"
              style="padding: 6px; border-radius: 5px"
            >
              <option value="normal">Normal</option>
              <option value="anomaly">Anomaly</option>
            </select>
          </div>
          <canvas id="dragChart" height="140"></canvas>
        </div>
      </div>
    </div>

    <script>
      const ctx = document.getElementById("dragChart").getContext("2d");
      let currentType = "piezo";
      const CONTROL_COUNT = 32;
      const TARGET_COUNT = 128;

      // 🌟 1. DB에서 불러온 센서 목록과 현재 물리 파라미터를 저장할 전역 변수
      let sensorsData = [];
      let currentSensorParams = { k: 0.5, c: 0.01, temp: 25.0 };

      // 초기 빈 차트 데이터 (실제 데이터는 setPresetData에서 덮어씌워짐)
      const datasetPiezo = [
        {
          label: "Piezo Signal",
          data: [],
          borderColor: "#3b82f6",
          fill: true,
          backgroundColor: "rgba(59, 130, 246, 0.1)",
          tension: 0.1,
        },
      ];
      const datasetADXL = [
        { label: "X", data: [], borderColor: "#ef4444", tension: 0.1 },
        { label: "Y", data: [], borderColor: "#22c55e", tension: 0.1 },
        { label: "Z", data: [], borderColor: "#3b82f6", tension: 0.1 },
      ];

      const myChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: Array.from({ length: CONTROL_COUNT }, (_, i) => i),
          datasets: datasetPiezo, // 기본 Piezo
        },
        options: {
          scales: { y: { min: 0, max: 4095 } },
          plugins: { dragData: { round: 0 } },
        },
      });

      // 🌟 2. 센서 타입 변경 및 DB 데이터 Fetch
      async function changeSensor(type) {
        currentType = type;

        // UI 업데이트
        document.getElementById("btn-piezo").style.background =
          type === "piezo" ? "#3b82f6" : "#94a3b8";
        document.getElementById("btn-adxl").style.background =
          type === "adxl" ? "#3b82f6" : "#94a3b8";
        document.getElementById("chart-title").innerText =
          type.toUpperCase() + " 패턴 (32개 제어점)";

        myChart.data.datasets = type === "piezo" ? datasetPiezo : datasetADXL;

        try {
          const res = await fetch(`/api/db_sensors/${type}`);
          sensorsData = await res.json(); // 전역 변수에 저장
          const selectBox = document.getElementById("sensor_id_select");

          selectBox.innerHTML = "";

          if (sensorsData.length === 0) {
            selectBox.innerHTML = '<option value="">등록된 센서 없음</option>';
          } else {
            sensorsData.forEach((s) => {
              const opt = document.createElement("option");
              opt.value = s.id;
              opt.text = s.name + " (" + s.id + ")";
              selectBox.appendChild(opt);
            });
          }
          // 목록 갱신 후 파라미터 적용
          updateTargetSensor();
        } catch (e) {
          console.error("센서 목록 로딩 실패:", e);
          document.getElementById("sensor_id_select").innerHTML =
            '<option value="">DB 연결 에러</option>';
        }
      }

      // 🌟 3. 선택된 센서의 물리 파라미터 로드
      async function updateTargetSensor() {
        const selectedId = document.getElementById("sensor_id_select").value;
        const type = currentType;

        const sensor = sensorsData.find((s) => s.id === selectedId);
        if (sensor) {
          currentSensorParams = {
            k: sensor.physics_k || 0.5,
            c: sensor.physics_c || 0.01,
            temp: sensor.ambient_temp || 25.0,
          };
          console.log(`적용된 [${sensor.name}] 파라미터:`, currentSensorParams);
          setPresetData(); // 파라미터가 바뀌면 즉시 그래프 갱신
        }

        await fetch(`/api/set_sensor/${type}/${selectedId}`, {
          method: "POST",
        });
      }

      window.onload = () => {
        changeSensor("piezo");
      };

      // 보간 함수 (유지)
      function interpolate(points, targetLength) {
        const result = [];
        const factor = (points.length - 1) / (targetLength - 1);
        for (let i = 0; i < targetLength; i++) {
          const p = i * factor;
          const left = Math.floor(p);
          const right = Math.ceil(p);
          const weight = p - left;
          if (left === right) {
            result.push(points[left]);
          } else {
            const val = points[left] * (1 - weight) + points[right] * weight;
            result.push(Math.round(val));
          }
        }
        return result;
      }

      // 🌟 4. 물리 파라미터를 적용한 동적 데이터 생성 핵심 로직
      function setPresetData() {
        const label = document.getElementById("custom_label").value;
        const type = currentType;
        const { k, c, temp } = currentSensorParams;

        // 물리 법칙 계산
        const baseFreq = 0.5 * Math.sqrt(k); // 강성(k) -> 주파수
        const noiseScale = Math.max(2, temp * 0.5); // 온도(temp) -> 열 잡음
        const decay = c * 5; // 감쇠(c) -> 시각적 소멸 속도 (32포인트 기준 증폭)

        // 노이즈 생성기
        const getNoise = () => Math.random() * noiseScale * 2 - noiseScale;

        if (label === "normal") {
          // ✅ 정상 상태 (연속 진동)
          if (type === "piezo") {
            myChart.data.datasets[0].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(2048 + 600 * Math.sin(i * baseFreq) + getNoise()),
            );
          } else {
            // ADXL은 각 축마다 주파수와 위상(Phase)을 다르게 주어 리얼리티를 살림
            myChart.data.datasets[0].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 + 300 * Math.sin(i * baseFreq * 1.2) + getNoise(),
                ),
            );
            myChart.data.datasets[1].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 + 250 * Math.sin(i * baseFreq * 0.8 + 1.5) + getNoise(),
                ),
            );
            myChart.data.datasets[2].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2800 + 400 * Math.sin(i * baseFreq * 1.5) + getNoise(),
                ), // Z축은 2800 기준
            );
          }
        } else {
          // ❌ 비정상 상태 (충격 후 감쇠 진동)
          if (type === "piezo") {
            myChart.data.datasets[0].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 +
                    1500 * Math.exp(-decay * i) * Math.sin(i * baseFreq * 1.5) +
                    getNoise(),
                ),
            );
          } else {
            myChart.data.datasets[0].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 +
                    1200 * Math.exp(-decay * i) * Math.sin(i * baseFreq * 1.8) +
                    getNoise(),
                ),
            );
            myChart.data.datasets[1].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 +
                    1000 *
                      Math.exp(-decay * i) *
                      Math.sin(i * baseFreq * 1.2 + 1.5) +
                    getNoise(),
                ),
            );
            myChart.data.datasets[2].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2800 +
                    1200 * Math.exp(-decay * i) * Math.sin(i * baseFreq * 2.0) +
                    getNoise(),
                ),
            );
          }
        }
        myChart.update();
      }

      // 🌟 타이머(Loop)를 제어할 전역 변수
      let emulatorInterval = null;

      // 지속 전송 시작 함수
      async function startCustomLoop() {
        // 이미 실행 중이라면 중복 실행 방지를 위해 먼저 정지
        stopEmulator();

        // UI 버튼 상태 변경 (전송 중임을 시각적으로 표시)
        const startBtn = document.getElementById("btn-start");
        startBtn.innerText = "⏳ Sending Data... (Running)";
        startBtn.style.background = "#f59e0b"; // 주황색으로 변경

        // 1회 전송 로직을 함수로 묶음
        const sendData = async () => {
          const x_full = interpolate(
            myChart.data.datasets[0].data,
            TARGET_COUNT,
          );
          const y_full =
            currentType === "adxl"
              ? interpolate(myChart.data.datasets[1].data, TARGET_COUNT)
              : [];
          const z_full =
            currentType === "adxl"
              ? interpolate(myChart.data.datasets[2].data, TARGET_COUNT)
              : [];

          try {
            await fetch("/api/start_custom", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                label: document.getElementById("custom_label").value,
                custom_x: x_full,
                custom_y: y_full,
                custom_z: z_full,
              }),
            });
          } catch (e) {
            console.error("데이터 전송 실패:", e);
          }
        };

        // 1. 버튼 누르자마자 즉시 1번 전송
        await sendData();

        // 2. 1초(1000ms)마다 반복해서 전송하는 타이머 가동
        emulatorInterval = setInterval(sendData, 1000);
      }

      // 🌟 전송 정지 함수 (Stop 버튼 클릭 시 실행)
      function stopEmulator() {
        if (emulatorInterval) {
          clearInterval(emulatorInterval); // 타이머 폭파!
          emulatorInterval = null;
        }

        // UI 버튼 원상복구
        const startBtn = document.getElementById("btn-start");
        startBtn.innerText = "▶ Start Emulation";
        startBtn.style.background = "#6366f1";

        console.log("🛑 에뮬레이터 전송 정지됨");
      }
    </script>
  </body>
</html>
