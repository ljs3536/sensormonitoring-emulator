<html>
  <head>
    <title>Sensor Emulator Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@2.2.3/dist/chartjs-plugin-dragdata.min.js"></script>
  </head>
  <body
    style="font-family: sans-serif; padding: 20px; background-color: #f8fafc"
  >
    <div
      style="
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      "
    >
      <h2 style="text-align: center; color: #1e293b">
        📊 Precision Pattern Editor (32-Point)
      </h2>

      <div style="display: flex; gap: 20px; margin-top: 20px">
        <div
          style="
            flex: 1;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
          "
        >
          <h4 style="margin-top: 0">1. Sensor Type</h4>
          <button
            onclick="changeSensor('piezo')"
            id="btn-piezo"
            style="
              width: 100%;
              padding: 10px;
              margin-bottom: 8px;
              background: #3b82f6;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-weight: bold;
            "
          >
            Piezo
          </button>
          <button
            onclick="changeSensor('adxl')"
            id="btn-adxl"
            style="
              width: 100%;
              padding: 10px;
              background: #94a3b8;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-weight: bold;
            "
          >
            ADXL
          </button>

          <h4 style="margin-top: 20px">2. Target Sensor (DB)</h4>
          <select
            id="sensor_id_select"
            onchange="updateTargetSensor()"
            style="
              width: 100%;
              padding: 10px;
              border-radius: 8px;
              border: 1px solid #ccc;
              margin-bottom: 8px;
              background: white;
            "
          >
            <option value="">Loading...</option>
          </select>

          <h4 style="margin-top: 20px">3. Action</h4>
          <button
            onclick="fetch('/api/start_basic', { method: 'POST' })"
            style="
              width: 100%;
              padding: 10px;
              background: #10b981;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              margin-bottom: 8px;
            "
          >
            Auto Start
          </button>
          <button
            id="btn-start"
            onclick="startCustomLoop()"
            style="
              width: 100%;
              padding: 10px;
              background: #6366f1;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              margin-bottom: 8px;
              font-weight: bold;
              transition: 0.2s;
            "
          >
            ▶ Start Emulation
          </button>
          <button
            onclick="stopEmulator()"
            style="
              width: 100%;
              padding: 10px;
              background: #ef4444;
              color: white;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-weight: bold;
            "
          >
            ⏹ Stop
          </button>
        </div>

        <div style="flex: 3">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 10px;
            "
          >
            <h4 id="chart-title" style="margin: 0; color: #475569">
              Piezo 패턴 (32 제어점)
            </h4>
            <select
              id="custom_label"
              onchange="setPresetData()"
              style="padding: 6px; border-radius: 5px"
            >
              <option value="normal">Normal</option>
              <option value="anomaly">Anomaly</option>
            </select>
          </div>
          <canvas id="dragChart" height="140"></canvas>
        </div>
      </div>
    </div>

    <script>
      const ctx = document.getElementById("dragChart").getContext("2d");
      let currentType = "piezo";

      // 🌟 1. 기본 생성 및 전송 데이터를 128개로 완전히 고정
      const CONTROL_COUNT = 128;

      let sensorsData = [];
      let currentSensorParams = { k: 0.5, c: 0.01, temp: 25.0 };

      const datasetPiezo = [
        {
          label: "Piezo Signal",
          data: [],
          borderColor: "#3b82f6",
          fill: true,
          backgroundColor: "rgba(59, 130, 246, 0.1)",
          tension: 0.1,
        },
      ];
      const datasetADXL = [
        { label: "X", data: [], borderColor: "#ef4444", tension: 0.1 },
        { label: "Y", data: [], borderColor: "#22c55e", tension: 0.1 },
        { label: "Z", data: [], borderColor: "#3b82f6", tension: 0.1 },
      ];

      const myChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: Array.from({ length: CONTROL_COUNT }, (_, i) => i),
          datasets: datasetPiezo,
        },
        options: {
          scales: { y: { min: 0, max: 4095 } },
          plugins: { dragData: { round: 0 } },
          // 128개의 점이 화면에 가득 차므로, 점(Point) 크기를 줄여서 깔끔하게 보이게 합니다.
          elements: { point: { radius: 1 } },
        },
      });

      async function changeSensor(type) {
        currentType = type;

        document.getElementById("btn-piezo").style.background =
          type === "piezo" ? "#3b82f6" : "#94a3b8";
        document.getElementById("btn-adxl").style.background =
          type === "adxl" ? "#3b82f6" : "#94a3b8";
        document.getElementById("chart-title").innerText =
          type.toUpperCase() + " 패턴 (128 데이터)";

        myChart.data.datasets = type === "piezo" ? datasetPiezo : datasetADXL;

        try {
          const res = await fetch(`/api/db_sensors/${type}`);
          sensorsData = await res.json();
          const selectBox = document.getElementById("sensor_id_select");

          selectBox.innerHTML = "";

          if (sensorsData.length === 0) {
            selectBox.innerHTML = '<option value="">등록된 센서 없음</option>';
          } else {
            sensorsData.forEach((s) => {
              const opt = document.createElement("option");
              opt.value = s.id;
              opt.text = s.name + " (" + s.id + ")";
              selectBox.appendChild(opt);
            });
          }
          updateTargetSensor();
        } catch (e) {
          console.error("센서 목록 로딩 실패:", e);
          document.getElementById("sensor_id_select").innerHTML =
            '<option value="">DB 연결 에러</option>';
        }
      }

      async function updateTargetSensor() {
        const selectedId = document.getElementById("sensor_id_select").value;
        const type = currentType;

        const sensor = sensorsData.find((s) => s.id === selectedId);
        if (sensor) {
          currentSensorParams = {
            k: sensor.physics_k || 0.5,
            c: sensor.physics_c || 0.01,
            temp: sensor.ambient_temp || 25.0,
          };
          console.log(`적용된 [${sensor.name}] 파라미터:`, currentSensorParams);
          setPresetData();
        }

        await fetch(`/api/set_sensor/${type}/${selectedId}`, {
          method: "POST",
        });
      }

      window.onload = () => {
        changeSensor("piezo");
      };

      function setPresetData() {
        const label = document.getElementById("custom_label").value;
        const type = currentType;
        const { k, c, temp } = currentSensorParams;

        // ====================================================================
        // 🌟 [핵심 물리 수학] PINN 백엔드(1.0*a + c*v + k*x = 0)와 동일한 조건
        // ====================================================================
        // 1. 감쇠비 (Damping Factor)
        const damping = c / 2.0;

        // 2. 고유 진동수 (Damped Natural Frequency)
        // 루트 안이 음수가 되면 발산하므로 안전장치(Math.max) 추가
        const omega_d = Math.sqrt(Math.max(0.0001, k - Math.pow(damping, 2)));

        // 3. 노이즈 스케일 (방정식 검증을 위해 노이즈는 살짝 줄임)
        const noiseScale = Math.max(1, temp * 0.2);
        const getNoise = () => (Math.random() - 0.5) * noiseScale * 2;

        if (label === "normal") {
          // ✅ 완벽한 수학적 정상 상태 (Exact Damped Harmonic Oscillator)
          // 시간이 지날수록(i가 커질수록) e^(-damping * i)에 의해 진폭이 0으로 수렴합니다.
          if (type === "piezo") {
            myChart.data.datasets[0].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) => {
                const val =
                  2048 +
                  800 * Math.exp(-damping * i) * Math.sin(omega_d * i) +
                  getNoise();
                return Math.round(val);
              },
            );
          } else {
            // ADXL: 3축 모두 "동일한 물리계수(k, c)"를 공유해야 모델이 헷갈리지 않습니다.
            // 대신 위상차(+1.0, +2.0)와 초기 진폭(500, 400, 600)만 다르게 줍니다.
            myChart.data.datasets[0].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 +
                    500 * Math.exp(-damping * i) * Math.sin(omega_d * i) +
                    getNoise(),
                ),
            );
            myChart.data.datasets[1].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 +
                    400 * Math.exp(-damping * i) * Math.sin(omega_d * i + 1.0) +
                    getNoise(),
                ),
            );
            myChart.data.datasets[2].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2800 +
                    600 * Math.exp(-damping * i) * Math.sin(omega_d * i + 2.0) +
                    getNoise(),
                ),
            );
          }
        } else {
          // ❌ 비정상 상태 (구조적 파괴 시뮬레이션)
          // 정상 k, c를 완전히 무시하는 파동을 강제로 주입합니다.
          // 예: 배관이 찢어져서 강성(k)이 미친듯이 높아지고 감쇠(c)가 사라진 상태
          const broken_k = k * 4.0;
          const broken_omega = Math.sqrt(broken_k);
          const broken_damping = 0.0001; // 감쇠가 거의 안 됨

          if (type === "piezo") {
            myChart.data.datasets[0].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 +
                    1200 *
                      Math.exp(-broken_damping * i) *
                      Math.sin(broken_omega * i) +
                    getNoise(),
                ),
            );
          } else {
            myChart.data.datasets[0].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 +
                    1000 *
                      Math.exp(-broken_damping * i) *
                      Math.sin(broken_omega * i) +
                    getNoise(),
                ),
            );
            myChart.data.datasets[1].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2048 +
                    1000 *
                      Math.exp(-broken_damping * i) *
                      Math.sin(broken_omega * i + 1.5) +
                    getNoise(),
                ),
            );
            myChart.data.datasets[2].data = Array.from(
              { length: CONTROL_COUNT },
              (_, i) =>
                Math.round(
                  2800 +
                    1000 *
                      Math.exp(-broken_damping * i) *
                      Math.sin(broken_omega * i + 3.0) +
                    getNoise(),
                ),
            );
          }
        }
        myChart.update();
      }
      let emulatorInterval = null;

      async function startCustomLoop() {
        stopEmulator();

        const startBtn = document.getElementById("btn-start");
        startBtn.innerText = "⏳ Sending Data... (Running)";
        startBtn.style.background = "#f59e0b";

        const sendData = async () => {
          // 🌟 3. 화면에 그려진 128개의 원본 배열을 변형 없이 그대로 가져옴
          const x_full = myChart.data.datasets[0].data;
          const y_full =
            currentType === "adxl" ? myChart.data.datasets[1].data : [];
          const z_full =
            currentType === "adxl" ? myChart.data.datasets[2].data : [];

          try {
            await fetch("/api/start_custom", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                label: document.getElementById("custom_label").value,
                custom_x: x_full,
                custom_y: y_full,
                custom_z: z_full,
              }),
            });
          } catch (e) {
            console.error("데이터 전송 실패:", e);
          }
        };

        await sendData();
        emulatorInterval = setInterval(sendData, 1000);
      }

      function stopEmulator() {
        if (emulatorInterval) {
          clearInterval(emulatorInterval);
          emulatorInterval = null;
        }

        const startBtn = document.getElementById("btn-start");
        startBtn.innerText = "▶ Start Emulation";
        startBtn.style.background = "#6366f1";
      }
    </script>
  </body>
</html>
